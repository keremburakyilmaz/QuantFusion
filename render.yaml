services:
  - type: web
    name: quantfusion-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_MIGRATION_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://keremburakyilmaz.com,http://localhost:3000
      - key: NVIDIA_API_KEY
        sync: false
      - key: NIM_MODEL
        value: meta/llama-3.3-70b-instruct
      - key: NIM_OCR_MODEL
        value: nvidia/nemotron-ocr-v1
      - key: DEMO_PORTFOLIO_ID
        sync: false
      - key: SECRET_KEY
        generateValue: true
