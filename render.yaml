services:
  - type: web
    name: quantfusion-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quantfusion-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: quantfusion-redis
          property: connectionString
      - key: CORS_ORIGINS
        value: https://keremburakyilmaz.com,http://localhost:3000
      - key: NVIDIA_API_KEY
        sync: false
      - key: NIM_MODEL
        value: meta/llama-3.3-70b-instruct
      - key: NIM_OCR_MODEL
        value: nvidia/nemotron-ocr-v1
      - key: DEMO_PORTFOLIO_ID
        sync: false
      - key: SECRET_KEY
        generateValue: true

  - type: redis
    name: quantfusion-redis
    plan: free
    ipAllowList: []

databases:
  - name: quantfusion-db
    plan: free
    databaseName: quantfusion
    user: quantfusion
