name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: quantfusion_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/quantfusion_test
      REDIS_URL: redis://localhost:6379/0
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      SECRET_KEY: ci-test-secret-key
      DEMO_PORTFOLIO_ID: 00000000-0000-0000-0000-000000000000
      CORS_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
      - run: pytest tests/ -v --asyncio-mode=auto
